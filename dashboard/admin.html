<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — ClickDep</title>
    <link rel="stylesheet" href="/src/dashboard.css">
</head>

<body>
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
    <div class="orb orb--3"></div>

    <aside class="sidebar glass">
        <div class="sidebar__logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
            </svg>
            <span>ClickDep Admin</span>
        </div>

        <nav class="sidebar__nav">
            <a href="#" class="nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                </svg>
                <span>All Projects</span>
                <span class="nav-badge" id="total-count">0</span>
            </a>
            <a href="/dashboard" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
                </svg>
                <span>User Dashboard</span>
            </a>
        </nav>

        <div class="sidebar__user glass">
            <div class="user-avatar" style="background: linear-gradient(135deg, #ef4444, #dc2626);">A</div>
            <div class="user-info">
                <div class="user-email" id="admin-email">Admin</div>
                <button id="sign-out-btn" class="sign-out-btn">Sign Out →</button>
            </div>
        </div>
    </aside>

    <main class="main">
        <header class="header">
            <h1 class="header__title">Admin Panel</h1>
            <div style="display: flex; gap: 12px;">
                <button class="btn btn--ghost" id="stop-all-btn">Stop All</button>
                <button class="btn btn--ghost" style="color: #ef4444;" id="delete-all-btn">Delete All</button>
            </div>
        </header>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card glass">
                <div class="stat-icon" style="background: linear-gradient(135deg, #10b981, #059669);">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M12 6v6l4 2" />
                    </svg>
                </div>
                <div class="stat-info">
                    <div class="stat-label">Running</div>
                    <div class="stat-value" id="stat-running">0</div>
                </div>
            </div>
            <div class="stat-card glass">
                <div class="stat-icon" style="background: linear-gradient(135deg, #f59e0b, #d97706);">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" />
                    </svg>
                </div>
                <div class="stat-info">
                    <div class="stat-label">Building</div>
                    <div class="stat-value" id="stat-building">0</div>
                </div>
            </div>
            <div class="stat-card glass">
                <div class="stat-icon" style="background: linear-gradient(135deg, #6b7280, #4b5563);">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" />
                        <path d="M9 9h6v6H9z" />
                    </svg>
                </div>
                <div class="stat-info">
                    <div class="stat-label">Stopped</div>
                    <div class="stat-value" id="stat-stopped">0</div>
                </div>
            </div>
            <div class="stat-card glass">
                <div class="stat-icon" style="background: linear-gradient(135deg, #a855f7, #9333ea);">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                    </svg>
                </div>
                <div class="stat-info">
                    <div class="stat-label">Total Projects</div>
                    <div class="stat-value" id="stat-total">0</div>
                </div>
            </div>
        </div>

        <div class="projects-grid" id="projects-grid"></div>
    </main>

    <!-- Project Details Modal -->
    <div class="modal hidden" id="details-modal">
        <div class="modal__backdrop"></div>
        <div class="modal__content" style="max-width: 600px;">
            <button class="modal__close" id="close-details">&times;</button>
            <h2 class="modal__title" id="details-title">Project Details</h2>
            <div id="details-content">
                <div class="details-info">
                    <div class="detail-row">
                        <span class="detail-label">Owner</span>
                        <span class="detail-value" id="detail-owner">-</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Status</span>
                        <span class="detail-value" id="detail-status">-</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Framework</span>
                        <span class="detail-value" id="detail-framework">-</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Port</span>
                        <span class="detail-value" id="detail-port">-</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">GitHub</span>
                        <a class="detail-value detail-link" id="detail-github" href="#" target="_blank">-</a>
                    </div>
                </div>
                <div class="logs-section">
                    <h3>Logs</h3>
                    <div class="logs-container" id="logs-container">
                        <pre id="logs-content">Loading logs...</pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            padding: 24px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .stat-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon svg {
            width: 28px;
            height: 28px;
            stroke: white;
        }

        .stat-info {
            flex: 1;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            margin-top: 4px;
        }

        @media (max-width: 1200px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal.hidden {
            display: none;
        }

        .modal__backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
        }

        .modal__content {
            position: relative;
            background: rgba(20, 20, 40, 0.9);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            box-shadow: 0 50px 100px -30px rgba(0, 0, 0, 0.7);
        }

        .modal__close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .modal__close:hover {
            background: var(--glass-strong);
            color: var(--text);
            border-color: var(--accent);
        }

        .modal__title {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 32px;
        }

        .details-info {
            margin-bottom: 24px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--glass-border);
        }

        .detail-label {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .detail-value {
            font-weight: 600;
            font-size: 14px;
        }

        .detail-link {
            color: var(--accent);
            text-decoration: none;
        }

        .logs-section h3 {
            font-size: 16px;
            margin-bottom: 12px;
        }

        .logs-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 16px;
            max-height: 200px;
            overflow-y: auto;
        }

        .logs-container pre {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-break: break-all;
            margin: 0;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-badge.running {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .status-badge.building {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .status-badge.stopped {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
        }

        .status-badge.idle {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
        }
    </style>

    <script type="module">
        import { onAuthChange, logOut } from '/src/firebase-config.js';

        const ADMIN_EMAIL = 'amianadmin@gmail.com';
        const API = '/api';
        let projects = [];

        // Auth check - admin only
        onAuthChange((user) => {
            if (!user || user.email !== ADMIN_EMAIL) {
                alert('Admin access only!');
                window.location.href = '/';
                return;
            }
            document.getElementById('admin-email').textContent = user.email;
            loadProjects();
        });

        document.getElementById('sign-out-btn').addEventListener('click', async () => {
            await logOut();
            window.location.href = '/';
        });

        async function loadProjects() {
            try {
                const res = await fetch(`${API}/admin/projects`);
                const data = await res.json();
                projects = data.projects;

                // Update stats
                document.getElementById('stat-total').textContent = data.stats.total;
                document.getElementById('stat-running').textContent = data.stats.running;
                document.getElementById('stat-building').textContent = data.stats.building;
                document.getElementById('stat-stopped').textContent = data.stats.stopped;
                document.getElementById('total-count').textContent = data.stats.total;

                renderProjects();
            } catch (err) {
                console.error('Failed to load projects:', err);
            }
        }

        function renderProjects() {
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = projects.map(p => `
        <div class="project-card glass">
          <div class="project-card__glow"></div>
          <div class="project-card__header">
            <div class="project-card__status ${p.status}"></div>
            <h3 class="project-card__name">${p.name}</h3>
          </div>
          <div class="project-card__meta">
            <span class="tag">${p.framework || 'Unknown'}</span>
            <span class="port">${p.status === 'running' ? ':' + p.port : p.status}</span>
          </div>
          <div style="padding: 8px 0; font-size: 12px; color: var(--text-secondary);">
            👤 ${p.user_id || 'Unknown User'}
          </div>
          <div class="project-card__actions">
            <button class="btn btn--ghost btn--sm" onclick="showDetails('${p.id}')">Details</button>
            ${p.status === 'running'
                    ? `<button class="btn btn--ghost btn--sm" onclick="stopProject('${p.id}')">Stop</button>`
                    : `<button class="btn btn--primary btn--sm" onclick="deployProject('${p.id}')">Deploy</button>`
                }
            <button class="btn btn--ghost btn--sm" onclick="downloadSource('${p.id}', '${p.name}')">Download</button>
            <button class="btn btn--ghost btn--sm" style="color: #ef4444;" onclick="deleteProject('${p.id}')">Delete</button>
          </div>
        </div>
      `).join('');
        }

        window.deployProject = async (id) => {
            try {
                await fetch(`${API}/projects/${id}/deploy`, { method: 'POST' });
                await loadProjects();
            } catch (err) {
                alert('Deploy failed: ' + err.message);
            }
        };

        window.stopProject = async (id) => {
            try {
                await fetch(`${API}/projects/${id}/stop`, { method: 'POST' });
                await loadProjects();
            } catch (err) {
                alert('Stop failed: ' + err.message);
            }
        };

        window.deleteProject = async (id) => {
            if (!confirm('Delete this project?')) return;
            try {
                await fetch(`${API}/projects/${id}`, { method: 'DELETE' });
                await loadProjects();
            } catch (err) {
                alert('Delete failed: ' + err.message);
            }
        };

        window.downloadSource = async (id, name) => {
            try {
                const res = await fetch(`${API}/admin/projects/${id}/download`);
                const data = await res.json();
                alert(`Source code location:\\n${data.path}\\n\\nYou can access it via SSH or file manager.`);
            } catch (err) {
                alert('Download info failed: ' + err.message);
            }
        };

        window.showDetails = async (id) => {
            const project = projects.find(p => p.id === id);
            if (!project) return;

            document.getElementById('details-title').textContent = project.name;
            document.getElementById('detail-owner').textContent = project.user_id || 'Unknown';
            document.getElementById('detail-status').innerHTML = `<span class="status-badge ${project.status}">${project.status}</span>`;
            document.getElementById('detail-framework').textContent = project.framework || 'Unknown';
            document.getElementById('detail-port').textContent = project.port ? ':' + project.port : '-';
            document.getElementById('detail-github').href = project.github_url;
            document.getElementById('detail-github').textContent = project.github_url.replace('https://github.com/', '');

            document.getElementById('details-modal').classList.remove('hidden');
            loadLogs(id);
        };

        async function loadLogs(id) {
            try {
                const res = await fetch(`${API}/projects/${id}/logs?lines=50`);
                const data = await res.json();
                document.getElementById('logs-content').textContent = data.logs || 'No logs available';
            } catch (err) {
                document.getElementById('logs-content').textContent = 'Failed to load logs';
            }
        }

        document.getElementById('close-details').addEventListener('click', () => {
            document.getElementById('details-modal').classList.add('hidden');
        });

        document.getElementById('details-modal').querySelector('.modal__backdrop').addEventListener('click', () => {
            document.getElementById('details-modal').classList.add('hidden');
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('details-modal').classList.add('hidden');
            }
        });

        document.getElementById('stop-all-btn').addEventListener('click', async () => {
            if (!confirm('Stop all running projects?')) return;
            try {
                await fetch(`${API}/projects/stop-all`, { method: 'POST' });
                await loadProjects();
            } catch (err) {
                alert('Failed: ' + err.message);
            }
        });

        document.getElementById('delete-all-btn').addEventListener('click', async () => {
            if (!confirm('DELETE ALL PROJECTS? This cannot be undone!')) return;
            if (!confirm('Are you ABSOLUTELY sure?')) return;
            try {
                await fetch(`${API}/projects/delete-all`, { method: 'POST' });
                await loadProjects();
            } catch (err) {
                alert('Failed: ' + err.message);
            }
        });

        setInterval(loadProjects, 5000);
    </script>
</body>

</html>
