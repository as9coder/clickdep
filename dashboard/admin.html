<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — ClickDep</title>
    <link rel="stylesheet" href="/src/dashboard.css">
</head>

<body>
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
    <div class="orb orb--3"></div>

    <aside class="sidebar glass">
        <div class="sidebar__logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
            </svg>
            <span>ClickDep Admin</span>
        </div>

        <nav class="sidebar__nav">
            <a href="#" class="nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                </svg>
                <span>All Projects</span>
                <span class="nav-badge" id="total-count">0</span>
            </a>
            <a href="/dashboard" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
                </svg>
                <span>User Dashboard</span>
            </a>
        </nav>

        <div class="sidebar__user glass">
            <div class="user-avatar" style="background: linear-gradient(135deg, #ef4444, #dc2626);">A</div>
            <div class="user-info">
                <div class="user-email" id="admin-email">Admin</div>
                <button id="sign-out-btn" class="sign-out-btn">Sign Out →</button>
            </div>
        </div>
    </aside>

    <main class="main">
        <header class="header">
            <h1 class="header__title">Admin Panel</h1>
            <div style="display: flex; gap: 12px;">
                <button class="btn btn--ghost" id="stop-all-btn">Stop All</button>
                <button class="btn btn--ghost" style="color: #ef4444;" id="delete-all-btn">Delete All</button>
            </div>
        </header>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card glass">
                <div class="stat-icon" style="background: linear-gradient(135deg, #10b981, #059669);">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M12 6v6l4 2" />
                    </svg>
                </div>
                <div class="stat-info">
                    <div class="stat-label">Running</div>
                    <div class="stat-value" id="stat-running">0</div>
                </div>
            </div>
            <div class="stat-card glass">
                <div class="stat-icon" style="background: linear-gradient(135deg, #f59e0b, #d97706);">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" />
                    </svg>
                </div>
                <div class="stat-info">
                    <div class="stat-label">Building</div>
                    <div class="stat-value" id="stat-building">0</div>
                </div>
            </div>
            <div class="stat-card glass">
                <div class="stat-icon" style="background: linear-gradient(135deg, #6b7280, #4b5563);">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" />
                        <path d="M9 9h6v6H9z" />
                    </svg>
                </div>
                <div class="stat-info">
                    <div class="stat-label">Stopped</div>
                    <div class="stat-value" id="stat-stopped">0</div>
                </div>
            </div>
            <div class="stat-card glass">
                <div class="stat-icon" style="background: linear-gradient(135deg, #a855f7, #9333ea);">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                    </svg>
                </div>
                <div class="stat-info">
                    <div class="stat-label">Total Projects</div>
                    <div class="stat-value" id="stat-total">0</div>
                </div>
            </div>
        </div>

        <div class="projects-grid" id="projects-grid"></div>
    </main>

    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            padding: 24px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .stat-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon svg {
            width: 28px;
            height: 28px;
            stroke: white;
        }

        .stat-info {
            flex: 1;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            margin-top: 4px;
        }

        @media (max-width: 1200px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>

    <script type="module">
        import { onAuthChange, logOut } from '/src/firebase-config.js';

        const ADMIN_EMAIL = 'amianadmin@gmail.com';
        const API = '/api';
        let projects = [];

        // Auth check - admin only
        onAuthChange((user) => {
            if (!user || user.email !== ADMIN_EMAIL) {
                alert('Admin access only!');
                window.location.href = '/';
                return;
            }
            document.getElementById('admin-email').textContent = user.email;
            loadProjects();
        });

        document.getElementById('sign-out-btn').addEventListener('click', async () => {
            await logOut();
            window.location.href = '/';
        });

        async function loadProjects() {
            try {
                const res = await fetch(`${API}/admin/projects`);
                const data = await res.json();
                projects = data.projects;

                // Update stats
                document.getElementById('stat-total').textContent = data.stats.total;
                document.getElementById('stat-running').textContent = data.stats.running;
                document.getElementById('stat-building').textContent = data.stats.building;
                document.getElementById('stat-stopped').textContent = data.stats.stopped;
                document.getElementById('total-count').textContent = data.stats.total;

                renderProjects();
            } catch (err) {
                console.error('Failed to load projects:', err);
            }
        }

        function renderProjects() {
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = projects.map(p => `
        <div class="project-card glass">
          <div class="project-card__glow"></div>
          <div class="project-card__header">
            <div class="project-card__status ${p.status}"></div>
            <h3 class="project-card__name">${p.name}</h3>
          </div>
          <div class="project-card__meta">
            <span class="tag">${p.framework || 'Unknown'}</span>
            <span class="port">${p.status === 'running' ? ':' + p.port : p.status}</span>
          </div>
          <div class="project-card__actions">
            ${p.status === 'running'
                    ? `<button class="btn btn--ghost btn--sm" onclick="stopProject('${p.id}')">Stop</button>`
                    : `<button class="btn btn--primary btn--sm" onclick="deployProject('${p.id}')">Deploy</button>`
                }
            <button class="btn btn--ghost btn--sm" onclick="downloadSource('${p.id}', '${p.name}')">Download</button>
            <button class="btn btn--ghost btn--sm" style="color: #ef4444;" onclick="deleteProject('${p.id}')">Delete</button>
          </div>
        </div>
      `).join('');
        }

        window.deployProject = async (id) => {
            try {
                await fetch(`${API}/projects/${id}/deploy`, { method: 'POST' });
                await loadProjects();
            } catch (err) {
                alert('Deploy failed: ' + err.message);
            }
        };

        window.stopProject = async (id) => {
            try {
                await fetch(`${API}/projects/${id}/stop`, { method: 'POST' });
                await loadProjects();
            } catch (err) {
                alert('Stop failed: ' + err.message);
            }
        };

        window.deleteProject = async (id) => {
            if (!confirm('Delete this project?')) return;
            try {
                await fetch(`${API}/projects/${id}`, { method: 'DELETE' });
                await loadProjects();
            } catch (err) {
                alert('Delete failed: ' + err.message);
            }
        };

        window.downloadSource = async (id, name) => {
            try {
                const res = await fetch(`${API}/admin/projects/${id}/download`);
                const data = await res.json();
                alert(`Source code location:\\n${data.path}\\n\\nYou can access it via SSH or file manager.`);
            } catch (err) {
                alert('Download info failed: ' + err.message);
            }
        };

        document.getElementById('stop-all-btn').addEventListener('click', async () => {
            if (!confirm('Stop all running projects?')) return;
            try {
                await fetch(`${API}/projects/stop-all`, { method: 'POST' });
                await loadProjects();
            } catch (err) {
                alert('Failed: ' + err.message);
            }
        });

        document.getElementById('delete-all-btn').addEventListener('click', async () => {
            if (!confirm('DELETE ALL PROJECTS? This cannot be undone!')) return;
            if (!confirm('Are you ABSOLUTELY sure?')) return;
            try {
                await fetch(`${API}/projects/delete-all`, { method: 'POST' });
                await loadProjects();
            } catch (err) {
                alert('Failed: ' + err.message);
            }
        });

        setInterval(loadProjects, 5000);
    </script>
</body>

</html>
