<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — ClickDep</title>
    <link rel="stylesheet" href="/src/dashboard.css">
</head>

<body>
    <!-- Floating Orbs Background -->
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
    <div class="orb orb--3"></div>

    <!-- Sidebar -->
    <aside class="sidebar glass">
        <div class="sidebar__logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
            </svg>
            <span>ClickDep</span>
        </div>

        <nav class="sidebar__nav">
            <a href="#" class="nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7" rx="1" />
                    <rect x="14" y="3" width="7" height="7" rx="1" />
                    <rect x="3" y="14" width="7" height="7" rx="1" />
                    <rect x="14" y="14" width="7" height="7" rx="1" />
                </svg>
                <span>Projects</span>
                <span class="nav-badge">0</span>
            </a>
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 20V10M18 20V4M6 20v-4" />
                </svg>
                <span>Analytics</span>
            </a>
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" />
                </svg>
                <span>Settings</span>
            </a>
        </nav>

        <div class="sidebar__user glass">
            <div class="user-avatar" id="user-avatar">?</div>
            <div class="user-info">
                <div class="user-email" id="user-email">Loading...</div>
                <button id="sign-out-btn" class="sign-out-btn">Sign Out →</button>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
        <header class="header">
            <h1 class="header__title">Your Projects</h1>
            <button class="btn btn--primary" id="add-project-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14M5 12h14" />
                </svg>
                <span>New Project</span>
            </button>
        </header>

        <!-- Empty State -->
        <div class="empty-state glass" id="empty-state">
            <div class="empty-state__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                </svg>
            </div>
            <h3>No projects yet</h3>
            <p>Deploy your first project from GitHub in just a few clicks. It's completely free!</p>
            <button class="btn btn--primary" id="add-first-project-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14M5 12h14" />
                </svg>
                <span>Add Your First Project</span>
            </button>
        </div>

        <!-- Projects Grid -->
        <div class="projects-grid hidden" id="projects-grid">
            <!-- Sample Card 1 -->
            <div class="project-card glass">
                <div class="project-card__glow"></div>
                <div class="project-card__header">
                    <div class="project-card__status running"></div>
                    <h3 class="project-card__name">my-portfolio</h3>
                </div>
                <div class="project-card__meta">
                    <span class="tag">Vite</span>
                    <span class="port">:3001</span>
                </div>
                <div class="project-card__actions">
                    <button class="btn btn--ghost btn--sm">Details</button>
                    <button class="btn btn--ghost btn--sm">Stop</button>
                </div>
            </div>

            <!-- Sample Card 2 -->
            <div class="project-card glass">
                <div class="project-card__glow"></div>
                <div class="project-card__header">
                    <div class="project-card__status building"></div>
                    <h3 class="project-card__name">ecommerce-app</h3>
                </div>
                <div class="project-card__meta">
                    <span class="tag">Next.js</span>
                    <span class="port">Building...</span>
                </div>
                <div class="project-card__actions">
                    <button class="btn btn--ghost btn--sm">View Logs</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Add Project Modal -->
    <div class="modal hidden" id="add-modal">
        <div class="modal__backdrop"></div>
        <div class="modal__content">
            <button class="modal__close" id="close-modal">&times;</button>
            <h2 class="modal__title">✨ New Project</h2>
            <form id="add-form">
                <div class="form-group">
                    <label for="project-name">Project Name</label>
                    <input type="text" id="project-name" placeholder="my-awesome-project" required>
                </div>
                <div class="form-group">
                    <label for="github-url">GitHub Repository</label>
                    <input type="url" id="github-url" placeholder="https://github.com/username/repo" required>
                </div>
                <div class="form-group">
                    <label for="branch">Branch</label>
                    <input type="text" id="branch" placeholder="main" value="main">
                </div>
                <button type="submit" class="btn btn--primary btn--block">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7" />
                    </svg>
                    <span>Deploy Now</span>
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { onAuthChange, logOut } from '/src/firebase-config.js';

        // Auth check
        onAuthChange((user) => {
            if (!user) {
                window.location.href = '/';
                return;
            }

            document.getElementById('user-email').textContent = user.email || 'User';
            document.getElementById('user-avatar').textContent = (user.email || 'U')[0].toUpperCase();
        });

        // Sign out
        document.getElementById('sign-out-btn').addEventListener('click', async () => {
            await logOut();
            window.location.href = '/';
        });

        // Modal controls
        const modal = document.getElementById('add-modal');
        const openModal = () => modal.classList.remove('hidden');
        const closeModal = () => modal.classList.add('hidden');

        document.getElementById('add-project-btn').addEventListener('click', openModal);
        document.getElementById('add-first-project-btn').addEventListener('click', openModal);
        document.getElementById('close-modal').addEventListener('click', closeModal);
        modal.querySelector('.modal__backdrop').addEventListener('click', closeModal);

        // Escape key closes modal
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Form (placeholder)
        document.getElementById('add-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('🚀 Deployment coming soon!');
            closeModal();
        });
    </script>
</body>

</html>
