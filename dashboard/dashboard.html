<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — ClickDep</title>
    <link rel="stylesheet" href="/src/dashboard.css">
</head>

<body>
    <!-- Floating Orbs Background -->
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
    <div class="orb orb--3"></div>

    <!-- Sidebar -->
    <aside class="sidebar glass">
        <div class="sidebar__logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
            </svg>
            <span>ClickDep</span>
        </div>

        <nav class="sidebar__nav">
            <a href="#" class="nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7" rx="1" />
                    <rect x="14" y="3" width="7" height="7" rx="1" />
                    <rect x="3" y="14" width="7" height="7" rx="1" />
                    <rect x="14" y="14" width="7" height="7" rx="1" />
                </svg>
                <span>Projects</span>
                <span class="nav-badge" id="project-count">0</span>
            </a>
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 20V10M18 20V4M6 20v-4" />
                </svg>
                <span>Analytics</span>
            </a>
        </nav>

        <div class="sidebar__user glass">
            <div class="user-avatar" id="user-avatar">?</div>
            <div class="user-info">
                <div class="user-email" id="user-email">Loading...</div>
                <button id="sign-out-btn" class="sign-out-btn">Sign Out →</button>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
        <header class="header">
            <h1 class="header__title">Your Projects</h1>
            <button class="btn btn--primary" id="add-project-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14M5 12h14" />
                </svg>
                <span>New Project</span>
            </button>
        </header>

        <!-- Loading State -->
        <div class="loading-state" id="loading-state">
            <div class="spinner"></div>
            <p>Loading projects...</p>
        </div>

        <!-- Empty State -->
        <div class="empty-state glass hidden" id="empty-state">
            <div class="empty-state__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                </svg>
            </div>
            <h3>No projects yet</h3>
            <p>Deploy your first project from GitHub in just a few clicks. It's completely free!</p>
            <button class="btn btn--primary" id="add-first-project-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14M5 12h14" />
                </svg>
                <span>Add Your First Project</span>
            </button>
        </div>

        <!-- Projects Grid -->
        <div class="projects-grid hidden" id="projects-grid"></div>
    </main>

    <!-- Add Project Modal -->
    <div class="modal hidden" id="add-modal">
        <div class="modal__backdrop"></div>
        <div class="modal__content">
            <button class="modal__close" id="close-modal">&times;</button>
            <h2 class="modal__title">✨ New Project</h2>
            <form id="add-form">
                <div class="form-group">
                    <label for="project-name">Project Name</label>
                    <input type="text" id="project-name" placeholder="my-awesome-project" required>
                </div>
                <div class="form-group">
                    <label for="github-url">GitHub Repository</label>
                    <input type="url" id="github-url" placeholder="https://github.com/username/repo" required>
                </div>
                <div class="form-group">
                    <label for="branch">Branch</label>
                    <input type="text" id="branch" placeholder="main" value="main">
                </div>
                <div id="form-error" class="form-error hidden"></div>
                <button type="submit" class="btn btn--primary btn--block" id="submit-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7" />
                    </svg>
                    <span>Deploy Now</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Project Details Modal -->
    <div class="modal hidden" id="details-modal">
        <div class="modal__backdrop"></div>
        <div class="modal__content" style="max-width: 600px;">
            <button class="modal__close" id="close-details">&times;</button>
            <h2 class="modal__title" id="details-title">Project Details</h2>
            <div id="details-content">
                <div class="details-info">
                    <div class="detail-row">
                        <span class="detail-label">Status</span>
                        <span class="detail-value" id="detail-status">-</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Framework</span>
                        <span class="detail-value" id="detail-framework">-</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Port</span>
                        <span class="detail-value" id="detail-port">-</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">GitHub</span>
                        <a class="detail-value detail-link" id="detail-github" href="#" target="_blank">-</a>
                    </div>
                </div>
                <div class="logs-section">
                    <h3>Logs</h3>
                    <div class="logs-container" id="logs-container">
                        <pre id="logs-content">Loading logs...</pre>
                    </div>
                </div>
                <div class="details-actions">
                    <button class="btn btn--primary" id="detail-deploy-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 12h14M12 5l7 7-7 7" />
                        </svg>
                        Deploy
                    </button>
                    <button class="btn btn--ghost" id="detail-stop-btn">Stop</button>
                    <button class="btn btn--ghost" id="detail-delete-btn" style="color: #ef4444;">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <style>
        .loading-state {
            text-align: center;
            padding: 80px 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--glass-border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .form-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .form-error.hidden {
            display: none;
        }

        .details-info {
            margin-bottom: 24px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--glass-border);
        }

        .detail-label {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .detail-value {
            font-weight: 600;
            font-size: 14px;
        }

        .detail-link {
            color: var(--accent);
            text-decoration: none;
        }

        .logs-section h3 {
            font-size: 16px;
            margin-bottom: 12px;
        }

        .logs-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 16px;
            max-height: 200px;
            overflow-y: auto;
        }

        .logs-container pre {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-break: break-all;
            margin: 0;
        }

        .details-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-badge.running {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .status-badge.building {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .status-badge.stopped {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
        }

        .status-badge.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
    </style>

    <script type="module">
        import { onAuthChange, logOut, getCurrentUser } from '/src/firebase-config.js';

        const API = '/api';
        let projects = [];
        let currentProjectId = null;
        let logsInterval = null;
        let currentUser = null;

        // Auth check
        onAuthChange((user) => {
            if (!user) {
                window.location.href = '/';
                return;
            }
            currentUser = user;
            document.getElementById('user-email').textContent = user.email || 'User';
            document.getElementById('user-avatar').textContent = (user.email || 'U')[0].toUpperCase();
            loadProjects();
        });

        // Sign out
        document.getElementById('sign-out-btn').addEventListener('click', async () => {
            await logOut();
            window.location.href = '/';
        });

        // Load projects
        async function loadProjects() {
            try {
                const res = await fetch(`${API}/projects`, {
                    headers: { 'X-User-Id': currentUser.uid }
                });
                projects = await res.json();
                renderProjects();
            } catch (err) {
                console.error('Failed to load projects:', err);
            }
        }

        // Render projects
        function renderProjects() {
            const loadingEl = document.getElementById('loading-state');
            const emptyEl = document.getElementById('empty-state');
            const gridEl = document.getElementById('projects-grid');
            const countEl = document.getElementById('project-count');

            loadingEl.classList.add('hidden');
            countEl.textContent = projects.length;

            if (projects.length === 0) {
                emptyEl.classList.remove('hidden');
                gridEl.classList.add('hidden');
                return;
            }

            emptyEl.classList.add('hidden');
            gridEl.classList.remove('hidden');

            gridEl.innerHTML = projects.map(p => `
        <div class="project-card glass" data-id="${p.id}">
          <div class="project-card__glow"></div>
          <div class="project-card__header">
            <div class="project-card__status ${p.status}"></div>
            <h3 class="project-card__name">${p.name}</h3>
          </div>
          <div class="project-card__meta">
            <span class="tag">${p.framework || 'Unknown'}</span>
            <span class="port">${p.status === 'running' ? ':' + p.port : p.status}</span>
          </div>
          <div class="project-card__actions">
            <button class="btn btn--ghost btn--sm" onclick="showDetails('${p.id}')">Details</button>
            ${p.status === 'running'
                    ? `<button class="btn btn--ghost btn--sm" onclick="stopProject('${p.id}')">Stop</button>`
                    : `<button class="btn btn--primary btn--sm" onclick="deployProject('${p.id}')">Deploy</button>`
                }
          </div>
        </div>
      `).join('');
        }

        // Create project
        async function createProject(name, githubUrl, branch) {
            const res = await fetch(`${API}/projects`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-User-Id': currentUser.uid
                },
                body: JSON.stringify({ name, github_url: githubUrl, branch })
            });

            if (!res.ok) {
                const data = await res.json();
                throw new Error(data.error || 'Failed to create project');
            }

            return res.json();
        }

        // Deploy project
        window.deployProject = async function (id) {
            try {
                const btn = event?.target;
                if (btn) { btn.disabled = true; btn.textContent = 'Deploying...'; }

                await fetch(`${API}/projects/${id}/deploy`, { method: 'POST' });
                await loadProjects();
            } catch (err) {
                alert('Deploy failed: ' + err.message);
            }
        };

        // Stop project
        window.stopProject = async function (id) {
            try {
                const btn = event?.target;
                if (btn) { btn.disabled = true; btn.textContent = 'Stopping...'; }

                await fetch(`${API}/projects/${id}/stop`, { method: 'POST' });
                await loadProjects();
            } catch (err) {
                alert('Stop failed: ' + err.message);
            }
        };

        // Delete project
        async function deleteProject(id) {
            if (!confirm('Are you sure you want to delete this project? This cannot be undone.')) return;

            try {
                await fetch(`${API}/projects/${id}`, { method: 'DELETE' });
                closeDetailsModal();
                await loadProjects();
            } catch (err) {
                alert('Delete failed: ' + err.message);
            }
        }

        // Show details modal
        window.showDetails = async function (id) {
            currentProjectId = id;
            const project = projects.find(p => p.id === id);
            if (!project) return;

            document.getElementById('details-title').textContent = project.name;
            document.getElementById('detail-status').innerHTML = `<span class="status-badge ${project.status}">${project.status}</span>`;
            document.getElementById('detail-framework').textContent = project.framework || 'Unknown';
            document.getElementById('detail-port').textContent = project.port ? ':' + project.port : '-';
            document.getElementById('detail-github').href = project.github_url;
            document.getElementById('detail-github').textContent = project.github_url.replace('https://github.com/', '');

            document.getElementById('details-modal').classList.remove('hidden');
            loadLogs(id);

            // Auto-refresh logs
            if (logsInterval) clearInterval(logsInterval);
            logsInterval = setInterval(() => loadLogs(id), 3000);
        };

        // Load logs
        async function loadLogs(id) {
            try {
                const res = await fetch(`${API}/projects/${id}/logs?lines=50`);
                const data = await res.json();
                document.getElementById('logs-content').textContent = data.logs || 'No logs available';
            } catch (err) {
                document.getElementById('logs-content').textContent = 'Failed to load logs';
            }
        }

        // Close details modal
        function closeDetailsModal() {
            document.getElementById('details-modal').classList.add('hidden');
            if (logsInterval) clearInterval(logsInterval);
            currentProjectId = null;
        }

        // Modal controls - Add Project
        const addModal = document.getElementById('add-modal');
        const openAddModal = () => addModal.classList.remove('hidden');
        const closeAddModal = () => { addModal.classList.add('hidden'); document.getElementById('form-error').classList.add('hidden'); };

        document.getElementById('add-project-btn').addEventListener('click', openAddModal);
        document.getElementById('add-first-project-btn').addEventListener('click', openAddModal);
        document.getElementById('close-modal').addEventListener('click', closeAddModal);
        addModal.querySelector('.modal__backdrop').addEventListener('click', closeAddModal);

        // Modal controls - Details
        document.getElementById('close-details').addEventListener('click', closeDetailsModal);
        document.getElementById('details-modal').querySelector('.modal__backdrop').addEventListener('click', closeDetailsModal);
        document.getElementById('detail-deploy-btn').addEventListener('click', () => { if (currentProjectId) deployProject(currentProjectId); });
        document.getElementById('detail-stop-btn').addEventListener('click', () => { if (currentProjectId) stopProject(currentProjectId); });
        document.getElementById('detail-delete-btn').addEventListener('click', () => { if (currentProjectId) deleteProject(currentProjectId); });

        // Escape key closes modals
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeAddModal();
                closeDetailsModal();
            }
        });

        // Form submit
        document.getElementById('add-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('project-name').value.trim();
            const githubUrl = document.getElementById('github-url').value.trim();
            const branch = document.getElementById('branch').value.trim() || 'main';
            const submitBtn = document.getElementById('submit-btn');
            const errorEl = document.getElementById('form-error');

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span>Creating...</span>';
            errorEl.classList.add('hidden');

            try {
                await createProject(name, githubUrl, branch);
                closeAddModal();
                document.getElementById('add-form').reset();
                await loadProjects();
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg><span>Deploy Now</span>';
            }
        });

        // Refresh projects every 5 seconds
        setInterval(loadProjects, 5000);
    </script>
</body>

</html>
